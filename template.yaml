AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Commit Mog backend

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  CommitMogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: app.handler
      Runtime: python3.13
      Environment:
        Variables:
          GITHUB_TOKEN: '{{resolve:ssm:/commit-mog/github-token}}'
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL (set this as VITE_BACKEND_URL in Vercel)
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
